name: CI

on: [push, pull_request]

jobs:
  tests:
    name: Build and run tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # The test target links Google Test/Mock statically from vcpkg; restore
      # them and integrate so MSBuild finds them. Only the test project is built
      # here -- never the DLL -- so nothing is injected into the game. The
      # overlay triplet (triplets/) builds gtest with the STL's vectorized
      # algorithm helpers disabled; see that file for why.
      - name: Install Google Test via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg" install gtest:x86-windows-static-md --overlay-triplets="$env:GITHUB_WORKSPACE\triplets"
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg" integrate install

      # Building the test project runs the suite via its RunTests target, so a
      # green build here means the tests passed.
      - name: Build and run tests
        run: msbuild FateHacks\FateHacksTests.vcxproj /p:Configuration=Debug /p:Platform=Win32 /nologo /v:minimal
